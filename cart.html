<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your shopping cart at EMCA MOTORS LIMITED. Review items, proceed to checkout and complete your order via WhatsApp.">
    <title>EMCA MOTORS LIMITED | Cart &amp; Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="bg-zinc-950 text-white" data-page="cart">
    <!-- NAVBAR -->
    <nav class="bg-black sticky top-0 z-50 border-b border-orange-600">
        <!-- same navbar -->
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-12">
        <h1 class="text-5xl font-black mb-8">Your Cart</h1>

        <!-- Cart Items -->
        <div id="cart-items" class="bg-zinc-900 rounded-3xl p-8 mb-10">
            <!-- JS populated -->
        </div>

        <!-- Order Summary & Checkout Form -->
        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 bg-zinc-900 rounded-3xl p-8">
                <h2 class="text-2xl font-semibold mb-6">Checkout Details</h2>
                <form id="checkout-form" onsubmit="handleCheckout(event)">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-sm mb-2">Full Name</label>
                            <input id="checkout-name" type="text" required class="w-full px-6 py-4 rounded-2xl bg-white/10 border border-white/30">
                        </div>
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-sm mb-2">Phone (WhatsApp)</label>
                            <input id="checkout-phone" type="tel" value="+254" required class="w-full px-6 py-4 rounded-2xl bg-white/10 border border-white/30">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm mb-2">Email</label>
                            <input id="checkout-email" type="email" class="w-full px-6 py-4 rounded-2xl bg-white/10 border border-white/30">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm mb-2">Delivery Location / Town</label>
                            <input id="checkout-location" type="text" value="Lodwar" required class="w-full px-6 py-4 rounded-2xl bg-white/10 border border-white/30">
                        </div>
                    </div>

                    <button type="submit" 
                            class="mt-8 w-full py-6 bg-gradient-to-r from-red-600 to-red-700 rounded-3xl text-xl font-bold flex items-center justify-center gap-x-4">
                        <i class="fa-solid fa-paper-plane"></i>
                        PLACE ORDER VIA WHATSAPP
                    </button>
                </form>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-zinc-900 rounded-3xl p-8 sticky top-8">
                    <h3 class="font-semibold mb-4">Order Summary</h3>
                    <div id="order-summary" class="space-y-4">
                        <!-- JS populated -->
                    </div>
                    <div class="border-t border-zinc-700 my-6"></div>
                    <div class="flex justify-between text-xl font-bold">
                        <span>Total</span>
                        <span id="cart-total" class="text-red-400">KES 0</span>
                    </div>
                    <p class="text-xs text-emerald-400 mt-2">✅ Free delivery within Lodwar • Cash on delivery / M-Pesa accepted</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-black pt-12 pb-8 border-t border-zinc-800">
        <!-- footer -->
    </footer>
</body>
</html>
