<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shop genuine auto spare parts at EMCA MOTORS LIMITED Lodwar. Oil filters, brake pads, tyres, batteries &amp; more. Fast checkout &amp; delivery.">
    <title>EMCA MOTORS LIMITED | Shop Spare Parts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="bg-zinc-950 text-white" data-page="shop">
    <!-- NAVBAR (same as index but copied for completeness) -->
    <nav class="bg-black sticky top-0 z-50 border-b border-orange-600">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-x-2">
                <img src="Emca.png" alt="EMCA Motors Logo" class="h-10 w-auto">
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter">EMCA MOTORS</h1>
                        <p class="text-[10px] text-zinc-400 -mt-1">LIMITED • LODWAR</p>
                    </div>
                </div>

                <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                    <a href="index.html" class="hover:text-orange-500 transition-colors">HOME</a>
                    <a href="shop.html" class="text-orange-500">SHOP PARTS</a>
                    <a href="services.html" class="hover:text-orange-500 transition-colors">SERVICES</a>
                    <a href="about.html" class="hover:text-orange-500 transition-colors">ABOUT</a>
                    <a href="pricing.html" class="hover:text-orange-500 transition-colors">PRICING</a>
                    <a href="faq.html" class="hover:text-orange-500 transition-colors">FAQ</a>
                    <a href="contact.html" class="hover:text-orange-500 transition-colors">CONTACT</a>
                </div>

                <div class="flex items-center gap-x-4">
                    <a href="cart.html" class="relative flex items-center gap-x-1 hover:text-orange-500 transition-colors">
                        <i class="fa-solid fa-cart-shopping text-xl"></i>
                        <span id="cart-count-nav" class="absolute -top-1 -right-1 bg-orange-600 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
                    </a>
                    <a href="https://wa.me/254768927893?text=Hello%20EMCA%20Motors%2C%20I%20need%20help%20with%20my%20vehicle" target="_blank"
                       class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-full flex items-center gap-x-2 text-sm font-medium">
                        <i class="fa-brands fa-whatsapp text-xl"></i>
                        <span class="hidden sm:inline">Chat</span>
                    </a>
                    <button onclick="toggleMobileMenu()" class="md:hidden text-2xl"><i class="fa-solid fa-bars" id="mobile-menu-icon"></i></button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-black border-t border-zinc-800 px-4 py-6">
            <!-- mobile links same as index -->
            <div class="flex flex-col gap-y-4 text-lg">
                <a href="index.html" class="py-2 border-b border-zinc-800">🏠 HOME</a>
                <a href="shop.html" class="py-2 border-b border-zinc-800 text-red-500">🛒 SHOP PARTS</a>
                <a href="services.html" class="py-2 border-b border-zinc-800">🔧 SERVICES</a>
                <a href="about.html" class="py-2 border-b border-zinc-800">ℹ️ ABOUT US</a>
                <a href="pricing.html" class="py-2 border-b border-zinc-800">💰 PRICING</a>
                <a href="faq.html" class="py-2 border-b border-zinc-800">❓ FAQ</a>
                <a href="contact.html" class="py-2">📞 CONTACT</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-5xl font-black mb-2">Spare Parts Shop</h1>
        <p class="text-zinc-400">Genuine parts delivered fast in Lodwar • Prices in KES</p>

        <!-- Filters & Search -->
        <div class="flex flex-col lg:flex-row gap-4 mt-8 mb-6">
            <div class="flex-1">
                <input id="search-input" 
                       onkeyup="if(event.key==='Enter') filterProducts()"
                       type="text" 
                       placeholder="Search oil filters, tyres, batteries..." 
                       class="w-full bg-white/10 border border-white/20 focus:border-red-600 rounded-2xl px-6 py-4 outline-none text-white placeholder:text-zinc-400">
            </div>

            <div class="flex gap-3 overflow-x-auto pb-2 lg:pb-0">
                <button onclick="filterByCategory('all')" id="cat-all"
                        class="category-btn active px-6 py-3 bg-white text-black rounded-2xl whitespace-nowrap font-medium flex items-center gap-x-2">
                    <i class="fa-solid fa-list"></i> ALL PARTS
                </button>
                <button onclick="filterByCategory('Oil Filters')" class="category-btn px-6 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-2xl whitespace-nowrap font-medium">Oil Filters</button>
                <button onclick="filterByCategory('Air Filters')" class="category-btn px-6 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-2xl whitespace-nowrap font-medium">Air Filters</button>
                <button onclick="filterByCategory('Fuel Filters')" class="category-btn px-6 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-2xl whitespace-nowrap font-medium">Fuel Filters</button>
                <button onclick="filterByCategory('Brake Pads')" class="category-btn px-6 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-2xl whitespace-nowrap font-medium">Brake Pads</button>
                <button onclick="filterByCategory('Motor Oils')" class="category-btn px-6 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-2xl whitespace-nowrap font-medium">Motor Oils</button>
                <button onclick="filterByCategory('Batteries')" class="category-btn px-6 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-2xl whitespace-nowrap font-medium">Batteries</button>
                <button onclick="filterByCategory('Tyres')" class="category-btn px-6 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-2xl whitespace-nowrap font-medium">Tyres</button>
                <button onclick="filterByCategory('Suspension Parts')" class="category-btn px-6 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-2xl whitespace-nowrap font-medium">Suspension</button>
                <button onclick="filterByCategory('Engine Parts')" class="category-btn px-6 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-2xl whitespace-nowrap font-medium">Engine Parts</button>
                <button onclick="filterByCategory('Other Garage Spare Parts')" class="category-btn px-6 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-2xl whitespace-nowrap font-medium">Other</button>
            </div>
        </div>

        <!-- Products Grid -->
        <div id="products-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Dynamically populated by script.js -->
        </div>
    </div>

    <!-- FOOTER (same as index) -->
    <footer class="bg-black pt-12 pb-8 border-t border-zinc-800">
        <!-- Identical footer content as index.html – omitted here for brevity but identical in real files -->
        <div class="max-w-7xl mx-auto px-4 text-center text-xs text-zinc-500">
            © 2026 EMCA MOTORS LIMITED • Shop • Services • Lodwar, Kenya
        </div>
    </footer>

    <!-- WhatsApp floating button (same) -->
    <a href="https://wa.me/254768927893?text=Hello%20EMCA%20Motors%2C%20I%20found%20a%20part%20I%20like%20on%20your%20shop" target="_blank"
       class="fixed bottom-8 right-8 bg-green-500 hover:scale-110 transition-transform shadow-2xl w-14 h-14 rounded-2xl flex items-center justify-center text-4xl z-[9999]">
        <i class="fa-brands fa-whatsapp"></i>
    </a>
</body>
</html>
