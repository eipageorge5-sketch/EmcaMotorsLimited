                    <h1 class="text-2xl font-black tracking-tighter text-orange-500">EMCA MOTORS</h1>

                </div>

            <!-- Desktop Menu -->

            <div class="flex items-center gap-x-4">
                <a href="cart.html" class="relative flex items-center gap-x-1 hover:text-orange-500 transition-colors">

                </a>

                <button onclick="toggleMobileMenu()" class="md:hidden text-2xl">
                    <i class="fa-solid fa-bars" id="mobile-menu-icon"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-black border-t border-zinc-800 px-4 py-6">

            <a href="services.html" class="py-2">🔧 SERVICES</a>
            <a href="about.html" class="py-2">ℹ️ ABOUT</a>
            <a href="pricing.html" class="py-2">💰 PRICING</a>

    <div class="max-w-7xl mx-auto px-4 py-16 grid md:grid-cols-12 gap-12">
        <div class="md:col-span-7">
            <h1 class="text-5xl font-black mb-8">Get In Touch</h1>
            <form id="contact-form" onsubmit="handleContact(event)" class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block mb-2 text-sm">Your Name</label>
                        <input type="text" id="contact-name" required class="w-full px-6 py-5 bg-white/10 border border-white/30 rounded-3xl">
                    </div>
                    <div>
                        <label class="block mb-2 text-sm">Phone</label>
                        <input type="tel" id="contact-phone" required class="w-full px-6 py-5 bg-white/10 border border-white/30 rounded-3xl">
                    </div>
                </div>
                <div>
                    <label class="block mb-2 text-sm">Email</label>
                    <input type="email" id="contact-email" class="w-full px-6 py-5 bg-white/10 border border-white/30 rounded-3xl">
                </div>
                <div>
                    <label class="block mb-2 text-sm">Message</label>
                    <textarea id="contact-message" rows="6" class="w-full px-6 py-5 bg-white/10 border border-white/30 rounded-3xl"></textarea>
                </div>
                <button type="submit" class="w-full py-6 bg-orange-600 hover:bg-orange-700 rounded-3xl text-lg font-semibold">SEND MESSAGE • WE REPLY ON WHATSAPP</button>
            </form>
        </div>
        <div class="md:col-span-5 bg-zinc-900 p-8 rounded-3xl">
            <h3 class="text-2xl font-semibold mb-8">Visit or Call Us</h3>
            <p class="flex items-center gap-x-4 mb-6"><i class="fa-solid fa-phone text-3xl text-orange-500"></i> +254 712 345 678</p>
            <p class="flex items-center gap-x-4 mb-6"><i class="fa-solid fa-envelope text-3xl text-orange-500"></i> emcamotors16@gmail.com</p>
            <p class="flex items-center gap-x-4"><i class="fa-solid fa-location-dot text-3xl text-orange-500"></i> Naotin road Road, Kanamkemer, 30500 Lodwar, Rift Valley</p>
        </div>
    </div>

    <footer class="bg-black pt-12 pb-8 border-t border-zinc-800">
        <!-- footer -->
    </footer>
</body>
